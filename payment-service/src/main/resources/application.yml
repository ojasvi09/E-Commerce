# Port this service listens on. The API Gateway routes /api/payments/**
# here. As of Phase 3, charging is triggered by a Kafka event
# (inventory.reserved) rather than a direct HTTP call from order-service —
# the REST endpoints still exist for manual testing/CRUD via Postman.
server:
  port: 8085

spring:
  application:
    # Logical name for this service. Shows up in logs and would be used for
    # service discovery (Eureka/Consul) if one is added in a later phase.
    name: payment-service
  datasource:
    # Own database per service (database-per-service pattern) — paymentdb
    # is created by infra/postgres/init-databases.sql when Postgres first starts.
    url: jdbc:postgresql://localhost:5432/paymentdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: Hibernate auto-creates/alters tables from your @Entity classes
      # on startup. Fine for this learning project; a real production setup
      # would use versioned migrations (Flyway/Liquibase) instead.
      ddl-auto: update
    # Logs every generated SQL statement to the console — useful while
    # developing, noisy in production.
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ecommerce.payment.event
        spring.json.use.type.headers: false
        # As of Phase 4 this service consumes two topics/event types
        # (inventory.reserved, order.cancelled), so each @KafkaListener overrides
        # spring.json.value.default.type per-listener instead of one shared default.
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        # Exposes /actuator/health and /actuator/info over HTTP. Actuator
        # exposes nothing by default beyond /health, so this is an explicit
        # opt-in list, not the full set of available endpoints.
        include: health,info
