# Port this service listens on. The API Gateway routes /api/notifications/**
# here. As of Phase 3, notification records are created automatically by
# Kafka listeners reacting to payment.successful/payment.failed/
# inventory.failed — the REST endpoints still exist for manual testing/CRUD.
server:
  port: 8086

spring:
  application:
    # Logical name for this service. Shows up in logs and would be used for
    # service discovery (Eureka/Consul) if one is added in a later phase.
    name: notification-service
  datasource:
    # Own database per service (database-per-service pattern) — notificationdb
    # is created by infra/postgres/init-databases.sql when Postgres first starts.
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: Hibernate auto-creates/alters tables from your @Entity classes
      # on startup. Fine for this learning project; a real production setup
      # would use versioned migrations (Flyway/Liquibase) instead.
      ddl-auto: update
    # Logs every generated SQL statement to the console — useful while
    # developing, noisy in production.
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      # Notification Service never produces events, only consumes — no producer
      # block needed here, unlike the other 3 services in the chain.
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ecommerce.notification.event
        spring.json.use.type.headers: false
        # No single spring.json.value.default.type here (unlike inventory/payment) —
        # this service listens to 3 different topics/event types, so each
        # @KafkaListener in OrderOutcomeEventListener overrides this per-listener
        # via its own `properties` attribute instead.
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        # Exposes /actuator/health and /actuator/info over HTTP. Actuator
        # exposes nothing by default beyond /health, so this is an explicit
        # opt-in list, not the full set of available endpoints.
        include: health,info
