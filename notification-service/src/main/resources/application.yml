# Port this service listens on. The API Gateway routes /api/notifications/**
# here. As of Phase 4, notification records are created automatically by a
# single Kafka listener reacting to NotificationRequestedEvent, published by
# whichever service (inventory, payment, ...) decides the user needs telling
# something — the REST endpoints still exist for manual testing/CRUD.
server:
  port: 8086

spring:
  application:
    # Logical name for this service. Shows up in logs and would be used for
    # service discovery (Eureka/Consul) if one is added in a later phase.
    name: notification-service
  datasource:
    # Own database per service (database-per-service pattern) — notificationdb
    # is created by infra/postgres/init-databases.sql when Postgres first starts.
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: Hibernate auto-creates/alters tables from your @Entity classes
      # on startup. Fine for this learning project; a real production setup
      # would use versioned migrations (Flyway/Liquibase) instead.
      ddl-auto: update
    # Logs every generated SQL statement to the console — useful while
    # developing, noisy in production.
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      # Notification Service never produces events, only consumes — no producer
      # block needed here, unlike the other 3 services in the chain.
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Phase 7: wrapped in ErrorHandlingDeserializer — see order-service's
      # application.yml for why (a raw JsonDeserializer throws inside
      # KafkaConsumer.poll() on a malformed message, before the listener/error
      # handler ever runs, causing an infinite tight-loop with no backoff at all).
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.ecommerce.notification.event
        spring.json.use.type.headers: false
        # As of Phase 4, this service consumes exactly one topic/event type
        # (NotificationRequestedEvent), so the default type can live here at
        # the consumer-factory level instead of being overridden per-listener.
        # Still read by the delegate JsonDeserializer even wrapped in ErrorHandlingDeserializer.
        spring.json.value.default.type: com.ecommerce.notification.event.NotificationRequestedEvent
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        # Exposes /actuator/health and /actuator/info over HTTP. Actuator
        # exposes nothing by default beyond /health, so this is an explicit
        # opt-in list, not the full set of available endpoints.
        include: health,info
