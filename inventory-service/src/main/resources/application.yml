# Port this service listens on. The API Gateway routes /api/inventory/**
# here. As of Phase 3, reserve/release are triggered by Kafka events
# (order.created) rather than direct HTTP calls from order-service — the
# REST endpoints still exist for manual testing/CRUD via Postman.
server:
  port: 8083

spring:
  application:
    # Logical name for this service. Shows up in logs and would be used for
    # service discovery (Eureka/Consul) if one is added in a later phase.
    name: inventory-service
  datasource:
    # Own database per service (database-per-service pattern) — inventorydb
    # is created by infra/postgres/init-databases.sql when Postgres first starts.
    url: jdbc:postgresql://localhost:5432/inventorydb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: Hibernate auto-creates/alters tables from your @Entity classes
      # on startup. Fine for this learning project; a real production setup
      # would use versioned migrations (Flyway/Liquibase) instead.
      ddl-auto: update
    # Logs every generated SQL statement to the console — useful while
    # developing, noisy in production.
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # This service's own consumer group, separate from order-service's and
      # payment-service's — each service reads order.created independently.
      group-id: inventory-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Phase 7: wrapped in ErrorHandlingDeserializer — see order-service's
      # application.yml for why (a raw JsonDeserializer throws inside
      # KafkaConsumer.poll() on a malformed message, before the listener/error
      # handler ever runs, causing an infinite tight-loop with no backoff at all).
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.ecommerce.inventory.event
        spring.json.use.type.headers: false
        # As of Phase 4 this service consumes two topics/event types
        # (order.created, order.cancelled), so each @KafkaListener in
        # OrderCreatedEventListener overrides spring.json.value.default.type
        # per-listener instead of relying on one consumer-factory-wide default.
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        # Exposes /actuator/health and /actuator/info over HTTP. Actuator
        # exposes nothing by default beyond /health, so this is an explicit
        # opt-in list, not the full set of available endpoints.
        include: health,info
