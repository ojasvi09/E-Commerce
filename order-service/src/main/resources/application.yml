# Port this service listens on. The API Gateway routes /api/orders/** here.
server:
  port: 8084

spring:
  application:
    # Logical name for this service. Shows up in logs and would be used for
    # service discovery (Eureka/Consul) if one is added in a later phase.
    name: order-service
  datasource:
    # Own database per service (database-per-service pattern) — orderdb is
    # created by infra/postgres/init-databases.sql when Postgres first starts.
    url: jdbc:postgresql://localhost:5432/orderdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: Hibernate auto-creates/alters tables from your @Entity classes
      # on startup. Fine for this learning project; a real production setup
      # would use versioned migrations (Flyway/Liquibase) instead.
      ddl-auto: update
    # Logs every generated SQL statement to the console — useful while
    # developing, noisy in production.
    show-sql: true
  kafka:
    # Address of the Kafka broker started by docker-compose.yml (KAFKA_ADVERTISED_LISTENERS).
    bootstrap-servers: localhost:9092
    producer:
      # Serialize the record key as a plain String (we key by orderId.toString()) and
      # the value as JSON (event record -> JSON object) via Spring Kafka's JsonSerializer.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # order-service's single consumer group for all the topics it listens to
      # (inventory.failed, payment.successful, payment.failed). Kafka guarantees each
      # partition is only read by one consumer instance within a group — this is what
      # "explicit consumer groups" in the phase 3 goal refers to.
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Phase 7: wrapped in ErrorHandlingDeserializer instead of using JsonDeserializer
      # directly. A malformed/unparseable message throws inside KafkaConsumer.poll()
      # itself when JsonDeserializer is used directly — that's BEFORE the listener is
      # ever invoked, so DefaultErrorHandler (config/KafkaErrorHandlingConfig.java) never
      # sees it and can't route it to the DLQ; Kafka just keeps re-polling the same
      # unparseable record forever (found live during Phase 7 testing — a tight loop with
      # no backoff at all, worse than the retry-forever behavior Phase 7 exists to fix).
      # ErrorHandlingDeserializer catches the delegate's parse failure and hands it to the
      # listener container's error handling instead, where it surfaces as a
      # DeserializationException that DefaultErrorHandler already classifies as
      # non-retryable — straight to the DLQ, no retries wasted on bytes that can never parse.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.ecommerce.order.event
        # Don't rely on the producer's __TypeId__ header (which would point at the
        # PRODUCING service's package, e.g. com.ecommerce.payment.event.PaymentSuccessfulEvent
        # in payment-service) — deserialize straight into this service's own local copy
        # of the event class instead. This is what keeps services loosely coupled: each
        # side owns its own event DTOs and only agrees on the JSON shape, not the class.
        spring.json.use.type.headers: false
      # Start reading from the beginning of a topic if this consumer group has never
      # committed an offset before (e.g. first run against a fresh topic).
      auto-offset-reset: earliest

management:
  endpoints:
    web:
      exposure:
        include: health,info
