# Port this service listens on. The API Gateway routes /api/orders/** here.
server:
  port: 8084

spring:
  application:
    # Logical name for this service. Shows up in logs and would be used for
    # service discovery (Eureka/Consul) if one is added in a later phase.
    name: order-service
  datasource:
    # Own database per service (database-per-service pattern) — orderdb is
    # created by infra/postgres/init-databases.sql when Postgres first starts.
    url: jdbc:postgresql://localhost:5432/orderdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # update: Hibernate auto-creates/alters tables from your @Entity classes
      # on startup. Fine for this learning project; a real production setup
      # would use versioned migrations (Flyway/Liquibase) instead.
      ddl-auto: update
    # Logs every generated SQL statement to the console — useful while
    # developing, noisy in production.
    show-sql: true
  cloud:
    openfeign:
      client:
        config:
          # "default" applies to every @FeignClient unless overridden by a
          # client-specific block keyed by that client's `name` (we don't
          # override per-client here, both inventory/payment share this).
          default:
            # Max time (ms) to establish the TCP connection to the target
            # service before giving up.
            connectTimeout: 2000
            # Max time (ms) to wait for the response body once connected.
            # If either timeout is hit, Resilience4j's retry (below) kicks in.
            readTimeout: 3000

# Hardcoded base URLs for the services order-service calls directly over
# HTTP (Phase 2: reserve/release stock, charge payment). There is no service
# registry (Eureka/Consul) yet, so this is the entire "discovery" mechanism
# — same static-config pattern the API Gateway uses for its own routes.
# Consumed by @FeignClient(url = "${services.xxx.url}") in client/InventoryClient.java
# and client/PaymentClient.java.
services:
  inventory:
    url: http://localhost:8083
  payment:
    url: http://localhost:8085

# Resilience4j config for the two outbound Feign calls. Each block is keyed
# by the instance name passed to @Retry(name = "...") / @CircuitBreaker(name = "...")
# in client/FulfillmentClient.java — "inventory" and "payment" here must match
# those annotation values exactly, or the defaults apply instead silently.
resilience4j:
  retry:
    instances:
      inventory:
        # Retry a failed call up to 3 times total (1 original + 2 retries).
        max-attempts: 3
        # Wait 300ms between attempts (fixed backoff, no jitter/exponential
        # growth configured here).
        wait-duration: 300ms
        # Only retry on transport-level failures (timeouts, connection
        # refused/reset). Deliberately NOT retried: 4xx business errors like
        # "insufficient stock" (409) — those fail fast, retrying wouldn't help.
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
      payment:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
  circuitbreaker:
    instances:
      inventory:
        # Circuit breaker looks at the last 10 calls to decide open/closed.
        sliding-window-size: 10
        # If >= 50% of those 10 calls failed, the circuit trips to OPEN —
        # further calls fail immediately (via the fallback method) without
        # even attempting the network call, protecting a struggling downstream
        # service from more load.
        failure-rate-threshold: 50
        # Once OPEN, stay open for 10s before allowing any calls through again.
        wait-duration-in-open-state: 10s
        # After the wait, allow 3 trial calls through (HALF_OPEN state) to
        # test if the downstream service has recovered before fully closing.
        permitted-number-of-calls-in-half-open-state: 3
      payment:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        # health/info as usual, plus circuitbreakers/retries so you can
        # inspect live resilience state at runtime, e.g.
        # GET /actuator/circuitbreakers or GET /actuator/retries.
        include: health,info,circuitbreakers,retries
  health:
    circuitbreakers:
      # Folds each circuit breaker's current state (CLOSED/OPEN/HALF_OPEN)
      # into the overall GET /actuator/health response.
      enabled: true
